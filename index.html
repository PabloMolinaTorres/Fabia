<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cruce Fotográfico</title>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <style>
    :root {
      --bg: #f8fafc;
      --panel: #ffffff;
      --panel-soft: #f8fafc;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --border-strong: #94a3b8;
      --dark: #111827;
      --green: #8fca00;
      --green-dark: #6fa100;
      --blue: #2563eb;
      --blue-dark: #1d4ed8;
      --red: #dc2626;
      --shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }

    body.dark {
      --bg: #020617;
      --panel: #0f172a;
      --panel-soft: #111827;
      --text: #f8fafc;
      --muted: #94a3b8;
      --border: #1e293b;
      --border-strong: #475569;
      --dark: #f8fafc;
      --green: #8fca00;
      --green-dark: #a3d900;
      --blue: #60a5fa;
      --blue-dark: #3b82f6;
      --red: #f87171;
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.25);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      height: 72px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 34px;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .brand-icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: var(--green);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      box-shadow: 0 10px 25px rgba(143, 202, 0, 0.28);
    }

    .brand small {
      display: block;
      color: var(--muted);
      font-weight: 500;
      font-size: 12px;
      margin-top: 2px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .version {
      color: var(--muted);
      font-size: 13px;
      background: var(--panel-soft);
      border: 1px solid var(--border);
      padding: 8px 12px;
      border-radius: 999px;
    }

    .theme-toggle {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--panel-soft);
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
    }

    main {
      width: min(1380px, calc(100% - 36px));
      margin: 26px auto 60px;
    }

    .hero {
      background: linear-gradient(135deg, #111827 0%, #1f2937 70%, #314300 100%);
      color: white;
      padding: 28px;
      border-radius: 26px;
      box-shadow: var(--shadow);
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 44px);
      letter-spacing: -0.05em;
      line-height: 1.05;
    }

    .chips {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .chip {
      background: rgba(255, 255, 255, 0.09);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #e5e7eb;
      padding: 9px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
    }

    .grid {
      margin-top: 24px;
      display: grid;
      grid-template-columns: 430px 1fr;
      gap: 22px;
      align-items: start;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .card-header {
      padding: 20px 22px 0;
    }

    .card-header h2 {
      margin: 0;
      font-size: 18px;
      letter-spacing: -0.03em;
    }

    .card-body {
      padding: 22px;
    }

    .upload-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    .upload-box {
      min-height: 190px;
      border: 1.5px dashed var(--border-strong);
      background: var(--panel-soft);
      border-radius: 16px;
      padding: 22px;
      cursor: pointer;
      transition: 0.2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
    }

    .upload-box:hover,
    .upload-box.dragover {
      border-color: var(--blue);
      background: rgba(37, 99, 235, 0.06);
    }

    .upload-box.loaded {
      border-style: solid;
      border-color: var(--border);
      background: var(--panel-soft);
    }

    .upload-icon {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: #eef2f7;
      color: #475569;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 14px;
    }

    body.dark .upload-icon {
      background: #1e293b;
      color: #cbd5e1;
    }

    .upload-title {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 6px;
    }

    .upload-subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .upload-btn {
      height: 34px;
      border-radius: 6px;
      border: 1px solid var(--border);
      color: var(--blue);
      background: var(--panel);
      padding: 0 14px;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.04em;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .upload-status {
      position: absolute;
      top: 12px;
      right: 12px;
    }

    .file-name {
      margin-top: 12px;
      font-size: 12px;
      color: var(--muted);
      word-break: break-all;
      max-width: 100%;
    }

    input[type="file"] {
      display: none;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 24px;
      padding: 4px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
    }

    .badge-green {
      background: #ecfccb;
      color: #3f6212;
    }

    .badge-gray {
      background: #f1f5f9;
      color: #475569;
    }

    .badge-red {
      background: #fee2e2;
      color: #991b1b;
    }

    .badge-blue {
      background: #dbeafe;
      color: #1d4ed8;
    }

    body.dark .badge-gray {
      background: #1e293b;
      color: #cbd5e1;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    button {
      border: none;
      cursor: pointer;
      border-radius: 13px;
      height: 46px;
      padding: 0 16px;
      font-weight: 800;
      letter-spacing: -0.01em;
      transition: 0.2s ease;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .btn-primary {
      background: var(--dark);
      color: var(--bg);
    }

    body.dark .btn-primary {
      background: #f8fafc;
      color: #020617;
    }

    .btn-primary:hover:not(:disabled),
    .btn-green:hover:not(:disabled),
    .btn-light:hover:not(:disabled),
    .upload-btn:hover {
      transform: translateY(-1px);
    }

    .btn-green {
      background: var(--green);
      color: white;
    }

    .btn-light {
      background: var(--panel-soft);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .rules {
      margin-top: 18px;
      padding: 15px;
      border-radius: 14px;
      background: var(--panel-soft);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 12.5px;
      line-height: 1.6;
    }

    .message {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      font-size: 13px;
      line-height: 1.45;
      display: none;
    }

    .message.show {
      display: block;
    }

    .message.error {
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .message.ok {
      background: #f0fdf4;
      color: #166534;
      border: 1px solid #bbf7d0;
    }

    .message.warn {
      background: #fffbeb;
      color: #92400e;
      border: 1px solid #fde68a;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 18px;
    }

    .metric {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      min-height: 112px;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.3;
    }

    .metric strong {
      display: block;
      margin-top: 12px;
      font-size: 34px;
      letter-spacing: -0.06em;
    }

    .metric.green strong {
      color: var(--green-dark);
    }

    .metric.red strong {
      color: var(--red);
    }

    .metric.blue strong {
      color: var(--blue);
    }

    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 6px 0 16px;
    }

    .tab {
      height: 38px;
      border-radius: 999px;
      background: var(--panel-soft);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0 14px;
      font-size: 13px;
    }

    .tab.active {
      background: var(--dark);
      color: var(--bg);
      border-color: var(--dark);
    }

    body.dark .tab.active {
      background: #f8fafc;
      color: #020617;
    }

    .table-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .table-title h2 {
      margin: 0;
      font-size: 18px;
      letter-spacing: -0.03em;
    }

    .table-title p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .download-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .download-actions button {
      height: 38px;
      font-size: 12px;
      border-radius: 999px;
    }

    .table-wrap {
      width: 100%;
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--panel);
      max-height: 560px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 900px;
    }

    thead {
      position: sticky;
      top: 0;
      z-index: 2;
    }

    th {
      background: var(--panel-soft);
      color: var(--text);
      text-align: left;
      font-size: 12px;
      padding: 12px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    td {
      padding: 11px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 12.5px;
      color: var(--muted);
      vertical-align: top;
      white-space: nowrap;
    }

    tr:hover td {
      background: rgba(37, 99, 235, 0.05);
    }

    .empty {
      padding: 45px 18px;
      color: var(--muted);
      text-align: center;
      border: 1px dashed var(--border);
      border-radius: 16px;
      background: var(--panel-soft);
    }

    .footer-note {
      color: var(--muted);
      font-size: 12px;
      margin-top: 12px;
      line-height: 1.45;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 1100px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .metrics {
        grid-template-columns: 1fr;
      }

      header {
        padding: 0 18px;
      }
    }

    @media (max-width: 640px) {
      main {
        width: min(100% - 22px, 1380px);
      }

      .hero {
        padding: 24px;
      }

      .version {
        display: none;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="brand">
      <div class="brand-icon">F</div>
      <div>
        Cruce Fotográfico
        <small>Reporte · RIAL</small>
      </div>
    </div>

    <div class="header-actions">
      <div class="version">V0.1.2</div>
      <button class="theme-toggle" id="themeToggle" title="Cambiar modo">🌙</button>
    </div>
  </header>

  <main>
    <section class="hero">
      <h1>Pendientes fotográficos</h1>
      <div class="chips">
        <span class="chip">AMBIENTADO = 0</span>
        <span class="chip">SKU</span>
        <span class="chip">modelo_color</span>
      </div>
    </section>

    <section class="grid">
      <aside class="card">
        <div class="card-header">
          <h2>Cargar archivos</h2>
        </div>

        <div class="card-body">
          <div class="upload-grid">
            <label class="upload-box" id="boxReporte" for="fileReporte">
              <span class="upload-status badge badge-gray" id="badgeReporte">Pendiente</span>
              <div class="upload-icon">☁</div>
              <div class="upload-title">Reporte</div>
              <div class="upload-subtitle">Arrastre el archivo aquí</div>
              <div class="upload-btn">SELECCIONAR ARCHIVO</div>
              <div class="file-name" id="nameReporte">CSV / XLS / XLSX</div>
            </label>
            <input id="fileReporte" type="file" accept=".csv,.xlsx,.xls" />

            <label class="upload-box" id="boxRial" for="fileRial">
              <span class="upload-status badge badge-gray" id="badgeRial">Pendiente</span>
              <div class="upload-icon">☁</div>
              <div class="upload-title">RIAL</div>
              <div class="upload-subtitle">Arrastre el archivo aquí</div>
              <div class="upload-btn">SELECCIONAR ARCHIVO</div>
              <div class="file-name" id="nameRial">CSV / XLS / XLSX</div>
            </label>
            <input id="fileRial" type="file" accept=".csv,.xlsx,.xls" />
          </div>

          <div class="button-row">
            <button class="btn-primary" id="btnCruzar" disabled>Cruzar</button>
            <button class="btn-light" id="btnLimpiar">Limpiar</button>
          </div>

          <div class="rules">
            Columnas: <strong>SKU</strong>, <strong>AMBIENTADO</strong>, <strong>modelo_color</strong>.
          </div>

          <div class="message" id="messageBox"></div>
        </div>
      </aside>

      <section>
        <div class="metrics">
          <div class="metric green">
            <span>Sobrante</span>
            <strong id="mSobrante">0</strong>
          </div>

          <div class="metric blue">
            <span>Cruzado</span>
            <strong id="mCruzado">0</strong>
          </div>

          <div class="metric red">
            <span>No cruzado</span>
            <strong id="mNoCruzado">0</strong>
          </div>
        </div>

        <div class="card">
          <div class="card-body">
            <div class="table-actions">
              <div class="table-title">
                <h2 id="currentTitle">Resultado</h2>
                <p id="currentSubtitle">Sin datos.</p>
              </div>

              <div class="download-actions">
                <button class="btn-green" id="btnDescargarSobrante" disabled>Sobrante</button>
                <button class="btn-light" id="btnDescargarCruzado" disabled>Cruzado</button>
                <button class="btn-light" id="btnDescargarNoCruzado" disabled>No cruzado</button>
              </div>
            </div>

            <div class="tabs">
              <button class="tab active" data-view="sobrante">Sobrante</button>
              <button class="tab" data-view="cruzado">Cruzado</button>
              <button class="tab" data-view="noCruzado">No cruzado</button>
            </div>

            <div id="emptyState" class="empty">
              Carga archivos y cruza.
            </div>

            <div id="tableContainer" class="table-wrap hidden"></div>

            <div class="footer-note" id="footerNote">
              Vista previa: máximo 500 filas.
            </div>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script>
    let reporteRows = [];
    let rialRows = [];

    let resultadoSobrante = [];
    let resultadoCruzado = [];
    let resultadoNoCruzado = [];

    let columnasReporte = {};
    let columnasRial = {};

    let currentView = "sobrante";

    const $ = (id) => document.getElementById(id);

    const fileReporte = $("fileReporte");
    const fileRial = $("fileRial");
    const btnCruzar = $("btnCruzar");
    const btnLimpiar = $("btnLimpiar");

    const btnDescargarSobrante = $("btnDescargarSobrante");
    const btnDescargarCruzado = $("btnDescargarCruzado");
    const btnDescargarNoCruzado = $("btnDescargarNoCruzado");

    iniciarTema();
    configurarDragDrop("boxReporte", "fileReporte");
    configurarDragDrop("boxRial", "fileRial");

    $("themeToggle").addEventListener("click", alternarTema);

    fileReporte.addEventListener("change", async (event) => {
      const file = event.target.files[0];
      if (!file) return;

      try {
        reporteRows = await leerArchivo(file);
        marcarArchivoCargado("Reporte", file.name, reporteRows.length);
        validarBotonCruce();
        showMessage("ok", "Reporte cargado.");
      } catch (error) {
        reporteRows = [];
        showMessage("error", "Error al leer reporte.");
        console.error(error);
      }
    });

    fileRial.addEventListener("change", async (event) => {
      const file = event.target.files[0];
      if (!file) return;

      try {
        rialRows = await leerArchivo(file);
        marcarArchivoCargado("Rial", file.name, rialRows.length);
        validarBotonCruce();
        showMessage("ok", "RIAL cargado.");
      } catch (error) {
        rialRows = [];
        showMessage("error", "Error al leer RIAL.");
        console.error(error);
      }
    });

    btnCruzar.addEventListener("click", cruzarReportes);
    btnLimpiar.addEventListener("click", limpiarTodo);

    btnDescargarSobrante.addEventListener("click", () => {
      descargarExcel(resultadoSobrante, "sobrante");
    });

    btnDescargarCruzado.addEventListener("click", () => {
      descargarExcel(resultadoCruzado, "cruzado");
    });

    btnDescargarNoCruzado.addEventListener("click", () => {
      descargarExcel(resultadoNoCruzado, "no_cruzado");
    });

    document.querySelectorAll(".tab").forEach((tab) => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
        tab.classList.add("active");
        currentView = tab.dataset.view;
        renderVistaActual();
      });
    });

    function iniciarTema() {
      const savedTheme = localStorage.getItem("cruceFotograficoTheme");

      if (savedTheme === "dark") {
        document.body.classList.add("dark");
        $("themeToggle").textContent = "☀️";
      } else {
        document.body.classList.remove("dark");
        $("themeToggle").textContent = "🌙";
      }
    }

    function alternarTema() {
      document.body.classList.toggle("dark");

      const isDark = document.body.classList.contains("dark");
      localStorage.setItem("cruceFotograficoTheme", isDark ? "dark" : "light");
      $("themeToggle").textContent = isDark ? "☀️" : "🌙";
    }

    function configurarDragDrop(boxId, inputId) {
      const box = $(boxId);
      const input = $(inputId);

      ["dragenter", "dragover"].forEach((eventName) => {
        box.addEventListener(eventName, (event) => {
          event.preventDefault();
          event.stopPropagation();
          box.classList.add("dragover");
        });
      });

      ["dragleave", "drop"].forEach((eventName) => {
        box.addEventListener(eventName, (event) => {
          event.preventDefault();
          event.stopPropagation();
          box.classList.remove("dragover");
        });
      });

      box.addEventListener("drop", (event) => {
        const file = event.dataTransfer.files[0];
        if (!file) return;

        const dataTransfer = new DataTransfer();
        dataTransfer.items.add(file);
        input.files = dataTransfer.files;
        input.dispatchEvent(new Event("change"));
      });
    }

    function marcarArchivoCargado(tipo, nombre, total) {
      const box = tipo === "Reporte" ? $("boxReporte") : $("boxRial");
      const badge = tipo === "Reporte" ? $("badgeReporte") : $("badgeRial");
      const label = tipo === "Reporte" ? $("nameReporte") : $("nameRial");

      box.classList.add("loaded");
      badge.className = "upload-status badge badge-green";
      badge.textContent = "Cargado";
      label.textContent = `${nombre} · ${total.toLocaleString("es-CL")} filas`;
    }

    function validarBotonCruce() {
      btnCruzar.disabled = !(reporteRows.length > 0 && rialRows.length > 0);
    }

    async function leerArchivo(file) {
      const arrayBuffer = await file.arrayBuffer();

      const workbook = XLSX.read(arrayBuffer, {
        type: "array",
        raw: false,
        cellDates: false
      });

      const firstSheetName = workbook.SheetNames[0];
      const worksheet = workbook.Sheets[firstSheetName];

      const rows = XLSX.utils.sheet_to_json(worksheet, {
        defval: "",
        raw: false
      });

      return rows.map((row) => limpiarFila(row)).filter((row) => Object.keys(row).length > 0);
    }

    function limpiarFila(row) {
      const nueva = {};

      Object.keys(row).forEach((key) => {
        const cleanKey = String(key).trim();
        const value = row[key];

        if (cleanKey !== "") {
          nueva[cleanKey] = typeof value === "string" ? value.trim() : value;
        }
      });

      return nueva;
    }

    function cruzarReportes() {
      try {
        resetResultados();

        columnasReporte = detectarColumnasReporte(reporteRows);
        columnasRial = detectarColumnasRial(rialRows);

        const colSkuReporte = columnasReporte.sku;
        const colAmbientado = columnasReporte.ambientado;
        const colModeloColor = columnasReporte.modeloColor;
        const colSkuRial = columnasRial.sku;

        if (!colSkuReporte || !colAmbientado || !colModeloColor) {
          showMessage("error", "Faltan columnas en reporte.");
          return;
        }

        if (!colSkuRial) {
          showMessage("error", "Falta SKU en RIAL.");
          return;
        }

        const reporteConDatos = reporteRows
          .map((row, index) => ({
            ...row,
            __fila_reporte: index + 2,
            __sku_normalizado: normalizarSku(row[colSkuReporte]),
            __modelo_color_normalizado: normalizarTextoClave(row[colModeloColor]),
            __ambientado_normalizado: normalizarValor(row[colAmbientado])
          }))
          .filter((row) => row.__sku_normalizado !== "");

        const rialConDatos = rialRows
          .map((row, index) => ({
            ...row,
            __fila_rial: index + 2,
            __sku_normalizado: normalizarSku(row[colSkuRial])
          }))
          .filter((row) => row.__sku_normalizado !== "");

        const reporteAmbientado0 = reporteConDatos.filter((row) => {
          return esAmbientadoCero(row.__ambientado_normalizado);
        });

        const mapaSkuModeloColor = new Map();

        reporteConDatos.forEach((row) => {
          if (row.__sku_normalizado && row.__modelo_color_normalizado) {
            mapaSkuModeloColor.set(row.__sku_normalizado, {
              modeloColorNormalizado: row.__modelo_color_normalizado,
              modeloColorOriginal: row[colModeloColor]
            });
          }
        });

        const modelosColorCruzados = new Map();
        const skusRialCruzados = new Set();

        rialConDatos.forEach((rowRial) => {
          const skuRial = rowRial.__sku_normalizado;

          if (mapaSkuModeloColor.has(skuRial)) {
            const infoModelo = mapaSkuModeloColor.get(skuRial);

            skusRialCruzados.add(skuRial);

            if (!modelosColorCruzados.has(infoModelo.modeloColorNormalizado)) {
              modelosColorCruzados.set(infoModelo.modeloColorNormalizado, {
                modeloColorOriginal: infoModelo.modeloColorOriginal,
                skusRial: new Set()
              });
            }

            modelosColorCruzados.get(infoModelo.modeloColorNormalizado).skusRial.add(skuRial);
          }
        });

        resultadoSobrante = [];
        resultadoCruzado = [];

        reporteAmbientado0.forEach((row) => {
          const modeloKey = row.__modelo_color_normalizado;
          const filaLimpia = quitarCamposInternos(row);

          if (modelosColorCruzados.has(modeloKey)) {
            const info = modelosColorCruzados.get(modeloKey);

            resultadoCruzado.push({
              ...filaLimpia,
              ESTADO_CRUCE: "CRUZADO",
              MODELO_COLOR_CRUZADO: info.modeloColorOriginal,
              SKU_RIAL_ENCONTRADO: Array.from(info.skusRial).join(", ")
            });
          } else {
            resultadoSobrante.push({
              ...filaLimpia,
              ESTADO_CRUCE: "SOBRANTE"
            });
          }
        });

        resultadoNoCruzado = rialConDatos
          .filter((row) => !skusRialCruzados.has(row.__sku_normalizado))
          .map((row) => ({
            ...quitarCamposInternos(row),
            ESTADO_CRUCE: "NO CRUZADO"
          }));

        actualizarMetricas({
          sobrante: resultadoSobrante.length,
          cruzado: resultadoCruzado.length,
          noCruzado: resultadoNoCruzado.length
        });

        activarDescargas();

        currentView = "sobrante";
        document.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
        document.querySelector('[data-view="sobrante"]').classList.add("active");

        renderVistaActual();

        showMessage("ok", "Cruce listo.");
      } catch (error) {
        console.error(error);
        showMessage("error", "Error en el cruce.");
      }
    }

    function detectarColumnasReporte(rows) {
      const headers = obtenerHeaders(rows);

      return {
        sku: buscarHeader(headers, [
          "sku",
          "id sku",
          "id_sku",
          "product sku",
          "sku hijo",
          "skuhijo"
        ]),
        ambientado: buscarHeader(headers, [
          "ambientado",
          "tiene foto",
          "tiene_foto",
          "foto",
          "foto ambientada",
          "foto_ambientada",
          "% foto pub ai",
          "foto pub ai"
        ]),
        modeloColor: buscarHeader(headers, [
          "modelo_color",
          "modelo color",
          "modelocolor",
          "modelo-color",
          "modelo / color",
          "modelo/color"
        ])
      };
    }

    function detectarColumnasRial(rows) {
      const headers = obtenerHeaders(rows);

      return {
        sku: buscarHeader(headers, [
          "sku",
          "id sku",
          "id_sku",
          "product sku",
          "sku hijo",
          "skuhijo"
        ])
      };
    }

    function obtenerHeaders(rows) {
      const set = new Set();

      rows.forEach((row) => {
        Object.keys(row).forEach((key) => set.add(key));
      });

      return Array.from(set);
    }

    function buscarHeader(headers, candidates) {
      const normalizados = headers.map((header) => ({
        original: header,
        normalizado: normalizarHeader(header)
      }));

      const candidatosNormalizados = candidates.map((c) => normalizarHeader(c));

      for (const candidato of candidatosNormalizados) {
        const encontradoExacto = normalizados.find((h) => h.normalizado === candidato);
        if (encontradoExacto) return encontradoExacto.original;
      }

      for (const candidato of candidatosNormalizados) {
        const encontradoParcial = normalizados.find((h) => h.normalizado.includes(candidato));
        if (encontradoParcial) return encontradoParcial.original;
      }

      return null;
    }

    function normalizarHeader(value) {
      return String(value ?? "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .replace(/[%]/g, "")
        .replace(/[^a-z0-9]/g, "");
    }

    function normalizarSku(value) {
      let sku = String(value ?? "").trim();

      if (sku === "") return "";

      sku = sku
        .replace(/\s+/g, "")
        .replace(/\.0$/, "");

      return sku;
    }

    function normalizarValor(value) {
      return String(value ?? "")
        .trim()
        .toLowerCase()
        .replace(",", ".")
        .replace(/\s+/g, "");
    }

    function normalizarTextoClave(value) {
      return String(value ?? "")
        .trim()
        .toUpperCase()
        .replace(/\s+/g, " ");
    }

    function esAmbientadoCero(value) {
      const limpio = normalizarValor(value);

      return limpio === "0" ||
             limpio === "0.0" ||
             limpio === "no" ||
             limpio === "false" ||
             limpio === "sinfoto" ||
             limpio === "pendiente";
    }

    function quitarCamposInternos(row) {
      const limpio = {};

      Object.keys(row).forEach((key) => {
        if (!key.startsWith("__")) {
          limpio[key] = row[key];
        }
      });

      return limpio;
    }

    function actualizarMetricas(data) {
      $("mSobrante").textContent = data.sobrante.toLocaleString("es-CL");
      $("mCruzado").textContent = data.cruzado.toLocaleString("es-CL");
      $("mNoCruzado").textContent = data.noCruzado.toLocaleString("es-CL");
    }

    function activarDescargas() {
      btnDescargarSobrante.disabled = resultadoSobrante.length === 0;
      btnDescargarCruzado.disabled = resultadoCruzado.length === 0;
      btnDescargarNoCruzado.disabled = resultadoNoCruzado.length === 0;
    }

    function resetResultados() {
      resultadoSobrante = [];
      resultadoCruzado = [];
      resultadoNoCruzado = [];

      btnDescargarSobrante.disabled = true;
      btnDescargarCruzado.disabled = true;
      btnDescargarNoCruzado.disabled = true;
    }

    function renderVistaActual() {
      let data = [];
      let title = "";
      let subtitle = "";

      if (currentView === "sobrante") {
        data = resultadoSobrante;
        title = "Sobrante";
        subtitle = `${data.length.toLocaleString("es-CL")} filas`;
      }

      if (currentView === "cruzado") {
        data = resultadoCruzado;
        title = "Cruzado";
        subtitle = `${data.length.toLocaleString("es-CL")} filas`;
      }

      if (currentView === "noCruzado") {
        data = resultadoNoCruzado;
        title = "No cruzado";
        subtitle = `${data.length.toLocaleString("es-CL")} filas`;
      }

      $("currentTitle").textContent = title;
      $("currentSubtitle").textContent = subtitle;

      renderTabla(data);
    }

    function renderTabla(data) {
      const emptyState = $("emptyState");
      const tableContainer = $("tableContainer");

      if (!data || data.length === 0) {
        emptyState.classList.remove("hidden");
        tableContainer.classList.add("hidden");
        tableContainer.innerHTML = "";
        $("footerNote").textContent = "Vista previa: máximo 500 filas.";
        return;
      }

      emptyState.classList.add("hidden");
      tableContainer.classList.remove("hidden");

      const dataLimitada = data.slice(0, 500);
      const headers = obtenerHeaders(dataLimitada);

      let html = "<table><thead><tr>";

      headers.forEach((header) => {
        html += `<th>${escapeHtml(header)}</th>`;
      });

      html += "</tr></thead><tbody>";

      dataLimitada.forEach((row) => {
        html += "<tr>";

        headers.forEach((header) => {
          const value = row[header] ?? "";
          html += `<td>${renderCell(value, header)}</td>`;
        });

        html += "</tr>";
      });

      html += "</tbody></table>";

      tableContainer.innerHTML = html;

      if (data.length > 500) {
        $("footerNote").textContent = `Mostrando 500 de ${data.length.toLocaleString("es-CL")}.`;
      } else {
        $("footerNote").textContent = `${data.length.toLocaleString("es-CL")} filas.`;
      }
    }

    function renderCell(value, header) {
      const text = String(value ?? "");

      if (header === "ESTADO_CRUCE") {
        if (text === "SOBRANTE") {
          return `<span class="badge badge-green">SOBRANTE</span>`;
        }

        if (text === "CRUZADO") {
          return `<span class="badge badge-blue">CRUZADO</span>`;
        }

        if (text === "NO CRUZADO") {
          return `<span class="badge badge-red">NO CRUZADO</span>`;
        }
      }

      return escapeHtml(text);
    }

    function descargarExcel(data, nombreBase) {
      if (!data || data.length === 0) {
        showMessage("warn", "Sin datos.");
        return;
      }

      const worksheet = XLSX.utils.json_to_sheet(data);
      const workbook = XLSX.utils.book_new();

      XLSX.utils.book_append_sheet(workbook, worksheet, "Resultado");

      const fecha = obtenerFechaArchivo();
      const nombre = `${nombreBase}_${fecha}.xlsx`;

      XLSX.writeFile(workbook, nombre);
    }

    function obtenerFechaArchivo() {
      const now = new Date();
      const pad = (n) => String(n).padStart(2, "0");

      const yyyy = now.getFullYear();
      const mm = pad(now.getMonth() + 1);
      const dd = pad(now.getDate());
      const hh = pad(now.getHours());
      const min = pad(now.getMinutes());

      return `${yyyy}-${mm}-${dd}_${hh}${min}`;
    }

    function limpiarTodo() {
      reporteRows = [];
      rialRows = [];
      columnasReporte = {};
      columnasRial = {};

      resetResultados();

      fileReporte.value = "";
      fileRial.value = "";

      $("boxReporte").classList.remove("loaded");
      $("boxRial").classList.remove("loaded");

      $("badgeReporte").className = "upload-status badge badge-gray";
      $("badgeRial").className = "upload-status badge badge-gray";

      $("badgeReporte").textContent = "Pendiente";
      $("badgeRial").textContent = "Pendiente";

      $("nameReporte").textContent = "CSV / XLS / XLSX";
      $("nameRial").textContent = "CSV / XLS / XLSX";

      actualizarMetricas({
        sobrante: 0,
        cruzado: 0,
        noCruzado: 0
      });

      $("currentTitle").textContent = "Resultado";
      $("currentSubtitle").textContent = "Sin datos.";

      $("emptyState").classList.remove("hidden");
      $("tableContainer").classList.add("hidden");
      $("tableContainer").innerHTML = "";

      $("footerNote").textContent = "Vista previa: máximo 500 filas.";

      btnCruzar.disabled = true;

      showMessage("ok", "Limpio.");
    }

    function showMessage(type, text) {
      const box = $("messageBox");

      box.className = `message show ${type}`;
      box.textContent = text;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
